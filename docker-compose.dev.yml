# dev overrides: hot reload, source mounted, debug-friendly.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "pnpm prisma migrate deploy && pnpm dev"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://adapted:adapted@db:5432/adapted?schema=public
      AUTH_SECRET: devsecret
      AUTH_URL: http://localhost:3000
      AI_PROVIDER: mock
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
