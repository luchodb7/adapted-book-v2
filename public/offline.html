<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>You are offline · Adapted Books</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/icons/icon-192.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0f172a;
        --muted: #475569;
        --primary: #1e40ff;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0b1220; --fg: #f1f5f9; --muted: #94a3b8; }
      }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
      }
      main { max-width: 28rem; }
      h1 { font-size: 2rem; margin: 0 0 1rem; }
      p { color: var(--muted); line-height: 1.6; }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.625rem 1.25rem;
        background: var(--primary);
        color: white;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        We couldn't reach the server. Stories you have visited before are still available in
        the app. When your connection comes back, your changes will sync automatically.
      </p>
      <a href="/app">Try again</a>
    </main>
  </body>
</html>
